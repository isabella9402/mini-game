<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>K-판타지: 꼬마 도깨비의 모험</title>
<style>
  :root{
    --peach:#ffb7b2;
    --peach-d:#ff8f88;
    --mint:#b5ead7;
    --mint-d:#7fcbb0;
    --yellow:#fdfd96;
    --yellow-d:#e8e05a;
    --sky:#c7ceea;
    --pink:#ff9aa2;
    --ink:#4b3b57;
    --paper:#fff6f0;
  }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#12101a; }
  body{
    font-family:"Apple SD Gothic Neo","Malgun Gothic","Noto Sans KR","맑은 고딕",sans-serif;
    color:var(--ink);
    user-select:none; -webkit-user-select:none;
    image-rendering:pixelated;
    touch-action:none;
  }
  #game-canvas{ position:fixed; inset:0; display:block; image-rendering:pixelated; }

  /* ---------- Pixel/retro helpers ---------- */
  .pixel-panel{
    background:var(--paper);
    border:4px solid var(--ink);
    box-shadow:0 6px 0 rgba(75,59,87,.35), inset 0 0 0 4px #fff;
    border-radius:6px;
  }
  .pbtn{
    font-family:inherit; font-weight:900; letter-spacing:.5px;
    border:4px solid var(--ink); border-radius:8px;
    padding:14px 18px; cursor:pointer; color:var(--ink);
    box-shadow:0 5px 0 var(--ink); transition:transform .05s, box-shadow .05s;
    -webkit-user-select:none;
  }
  .pbtn:active{ transform:translateY(4px); box-shadow:0 1px 0 var(--ink); }
  .pbtn.peach{ background:var(--peach); }
  .pbtn.mint{ background:var(--mint); }
  .pbtn.yellow{ background:var(--yellow); }
  .pbtn.sky{ background:var(--sky); }
  .pbtn.pink{ background:var(--pink); }

  .overlay{ position:fixed; inset:0; display:flex; flex-direction:column; align-items:center;
    justify-content:center; padding:18px; z-index:20; }
  .hidden{ display:none !important; }

  /* ---------- Start Menu ---------- */
  #menu{ background:
      radial-gradient(120% 90% at 50% -10%, rgba(255,183,178,.55), transparent 60%),
      linear-gradient(160deg,#ffe3ec 0%, #e7f6ef 45%, #fff8d6 100%);
    overflow-y:auto;
  }
  #title{
    text-align:center; line-height:1.1; margin-bottom:6px;
    text-shadow:3px 3px 0 #fff, 6px 6px 0 rgba(75,59,87,.25);
  }
  #title .big{ font-size:clamp(28px,8vw,54px); font-weight:900; color:var(--peach-d); display:block; }
  #title .sub{ font-size:clamp(16px,4.5vw,26px); font-weight:900; color:var(--mint-d); display:block; margin-top:4px; }
  #mascot{ width:120px; height:120px; margin:4px 0 10px; image-rendering:pixelated; }
  .menu-btns{ display:flex; flex-direction:column; gap:12px; width:min(340px,86vw); }
  .menu-btns .pbtn{ font-size:20px; }
  #tutorial{ margin-top:16px; max-width:min(420px,90vw); text-align:center; font-size:13px;
    line-height:1.6; padding:12px 14px; }
  #tutorial b{ color:var(--peach-d); }
  #tteok-menu{ margin-top:12px; font-weight:900; font-size:16px; color:var(--ink);
    background:#fff; border:3px solid var(--ink); border-radius:20px; padding:6px 16px; }

  /* ---------- HUD ---------- */
  #hud{ position:fixed; inset:0; z-index:15; pointer-events:none; }
  #hud .tl{ position:absolute; top:calc(env(safe-area-inset-top,0) + 12px); left:12px; }
  #hud .score-box{ background:rgba(255,255,255,.85); border:3px solid var(--ink); border-radius:10px;
    padding:8px 12px; font-weight:900; }
  #hud .score-box .row{ font-size:18px; }
  #hud .score-box .tteok{ font-size:15px; color:var(--peach-d); margin-top:2px; }

  #center-top{ position:absolute; top:calc(env(safe-area-inset-top,0) + 12px); left:50%;
    transform:translateX(-50%); text-align:center; }
  #timer-box{ background:rgba(75,59,87,.9); color:#fff; border:3px solid #fff; border-radius:10px;
    padding:6px 14px; font-weight:900; font-size:22px; }
  #timer-box.warn{ background:#e5484d; animation:pulse .5s infinite alternate; }
  @keyframes pulse{ from{transform:translateX(0) scale(1);} to{transform:scale(1.08);} }
  #ghost-box{ margin-top:6px; background:rgba(80,150,255,.9); color:#fff; border:3px solid #fff;
    border-radius:10px; padding:5px 12px; font-weight:900; font-size:14px; }

  /* Fever gauge */
  #fever-wrap{ position:absolute; top:calc(env(safe-area-inset-top,0) + 12px); right:12px; width:150px; }
  #fever-label{ font-size:12px; font-weight:900; color:var(--ink); text-shadow:1px 1px 0 #fff; text-align:right; }
  #fever-bar{ height:18px; background:rgba(255,255,255,.7); border:3px solid var(--ink); border-radius:10px;
    overflow:hidden; margin-top:2px; }
  #fever-fill{ height:100%; width:0%; background:linear-gradient(90deg,#ffd36e,#ff7ea8,#8ad0ff);
    transition:width .15s; }
  #fever-wrap.on #fever-fill{ animation:feverGlow .4s infinite alternate; }
  @keyframes feverGlow{ from{filter:brightness(1);} to{filter:brightness(1.4);} }

  /* Controls */
  #controls{ position:absolute; bottom:calc(env(safe-area-inset-bottom,0) + 16px); left:0; right:0;
    display:flex; justify-content:space-between; align-items:flex-end; padding:0 18px; pointer-events:none; }
  #dpad{ position:relative; width:150px; height:150px; pointer-events:auto; }
  #dpad .db{ position:absolute; width:50px; height:50px; font-size:22px; display:flex;
    align-items:center; justify-content:center; background:rgba(255,255,255,.85);
    border:3px solid var(--ink); border-radius:10px; box-shadow:0 4px 0 var(--ink); font-weight:900; }
  #dpad .db:active{ transform:translateY(3px); box-shadow:0 1px 0 var(--ink); }
  #d-up{ left:50px; top:0; } #d-down{ left:50px; top:100px; }
  #d-left{ left:0; top:50px; } #d-right{ left:100px; top:50px; }
  #skill-btn{ pointer-events:auto; width:96px; height:96px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #cfe8ff, #6aa8ff); border:4px solid var(--ink);
    color:#183a6b; font-weight:900; font-size:16px; box-shadow:0 6px 0 var(--ink);
    display:flex; flex-direction:column; align-items:center; justify-content:center; }
  #skill-btn:active{ transform:translateY(4px); box-shadow:0 2px 0 var(--ink); }
  #skill-btn.cool{ filter:grayscale(.7) brightness(.85); }
  #skill-btn .cd{ font-size:13px; }

  /* ---------- Gacha / Costume ---------- */
  #gacha{ background:rgba(30,24,44,.72); }
  #gacha .box{ width:min(460px,94vw); max-height:88vh; overflow-y:auto; padding:16px; }
  #gacha h2{ text-align:center; margin:2px 0 6px; color:var(--peach-d); font-size:24px; }
  #gacha .tteok-line{ text-align:center; font-weight:900; margin-bottom:10px; }
  #gacha-roll{ display:block; width:100%; font-size:18px; margin-bottom:12px; }
  #gacha-result{ text-align:center; min-height:26px; font-weight:900; margin-bottom:10px; color:var(--mint-d); }
  #skin-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr)); gap:10px; }
  .skin-card{ border:3px solid var(--ink); border-radius:10px; padding:8px; text-align:center;
    background:#fff; position:relative; }
  .skin-card canvas{ width:48px; height:48px; margin:2px auto 4px; display:block; image-rendering:pixelated; }
  .skin-card .nm{ font-size:13px; font-weight:900; }
  .skin-card .rr{ font-size:11px; font-weight:900; margin:2px 0 6px; }
  .rr.C{ color:#8a8a8a;} .rr.R{ color:#3f8bd8;} .rr.SSR{ color:#e0952b;}
  .skin-card.locked{ opacity:.5; }
  .skin-card .st{ font-size:11px; font-weight:900; }
  .skin-card .eqbtn{ font-size:12px; padding:6px 8px; border-radius:6px; margin-top:2px; }
  .skin-card.equipped{ box-shadow:0 0 0 4px var(--yellow-d); }
  #gacha-close{ display:block; width:100%; margin-top:14px; font-size:18px; }

  /* ---------- Result ---------- */
  #result{ background:rgba(30,24,44,.78); }
  #result .box{ width:min(400px,90vw); padding:22px 18px; text-align:center; }
  #result .headline{ font-size:34px; font-weight:900; margin-bottom:6px; }
  #result .headline.win{ color:var(--mint-d);} #result .headline.lose{ color:var(--peach-d); }
  #result .rank{ font-size:22px; font-weight:900; margin:6px 0; }
  #result .rank .grade{ font-size:44px; color:var(--yellow-d); text-shadow:2px 2px 0 var(--ink); }
  #result .stats{ font-size:16px; font-weight:900; margin:10px 0; line-height:1.7; }
  #result .btns{ display:flex; gap:10px; margin-top:14px; }
  #result .btns .pbtn{ flex:1; font-size:17px; }

  .toast{ position:fixed; top:34%; left:50%; transform:translateX(-50%);
    background:rgba(75,59,87,.92); color:#fff; padding:10px 18px; border-radius:12px;
    font-weight:900; z-index:30; border:3px solid #fff; pointer-events:none; opacity:0;
    transition:opacity .2s; }
  .toast.show{ opacity:1; }
</style>
</head>
<body>
<canvas id="game-canvas"></canvas>

<!-- ================= START MENU ================= -->
<div id="menu" class="overlay">
  <div id="title">
    <span class="big">K-판타지</span>
    <span class="sub">꼬마 도깨비의 모험</span>
  </div>
  <canvas id="mascot" width="64" height="64"></canvas>
  <div class="menu-btns">
    <button class="pbtn peach" data-mode="infinite">무한 모드</button>
    <button class="pbtn mint" data-mode="timeattack">타임어택 모드</button>
    <button class="pbtn sky" data-mode="ghost">고스트 레이스</button>
    <button class="pbtn yellow" id="open-gacha">도감 &amp; 가챠</button>
  </div>
  <div id="tteok-menu">🍡 보유 떡: <span id="menu-tteok">0</span>개</div>
  <div id="tutorial" class="pixel-panel">
    <b>조작 방법:</b> 화면 터치/드래그 또는 방향키 (▲▼◀▶)<br />
    <b>은신 스킬:</b> [Shift] 키 / 스킬 버튼
  </div>
</div>

<!-- ================= HUD ================= -->
<div id="hud" class="hidden">
  <div class="tl">
    <div class="score-box">
      <div class="row">점수: <span id="hud-score">0</span></div>
      <div class="tteok">🍡 떡: <span id="hud-tteok">0</span></div>
    </div>
  </div>
  <div id="center-top">
    <div id="timer-box" class="hidden">남은 시간: <span id="hud-time">30</span>초</div>
    <div id="ghost-box" class="hidden">고스트와의 거리: <span id="hud-ghost">0</span>칸</div>
  </div>
  <div id="fever-wrap">
    <div id="fever-label">피버 게이지</div>
    <div id="fever-bar"><div id="fever-fill"></div></div>
  </div>
  <div id="controls">
    <div id="dpad">
      <div class="db" id="d-up">▲</div>
      <div class="db" id="d-down">▼</div>
      <div class="db" id="d-left">◀</div>
      <div class="db" id="d-right">▶</div>
    </div>
    <div id="skill-btn"><div>은신</div><div class="cd" id="skill-cd">준비</div></div>
  </div>
</div>

<!-- ================= GACHA / COSTUME ================= -->
<div id="gacha" class="overlay hidden">
  <div class="box pixel-panel">
    <h2>도깨비 옷장 &amp; 가챠</h2>
    <div class="tteok-line">🍡 보유 떡: <span id="gacha-tteok">0</span>개</div>
    <button class="pbtn pink" id="gacha-roll">가챠 뽑기 (떡 100개)</button>
    <div id="gacha-result"></div>
    <div id="skin-grid"></div>
    <button class="pbtn mint" id="gacha-close">닫기</button>
  </div>
</div>

<!-- ================= RESULT ================= -->
<div id="result" class="overlay hidden">
  <div class="box pixel-panel">
    <div class="headline" id="res-headline">게임 오버</div>
    <div class="rank hidden" id="res-rank"></div>
    <div class="stats" id="res-stats"></div>
    <div class="btns">
      <button class="pbtn mint" id="res-retry">다시 하기</button>
      <button class="pbtn peach" id="res-menu">메인으로</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
"use strict";
/* =========================================================================
   K-판타지: 꼬마 도깨비의 모험
   100% HTML5 2D Canvas pixel-art runner (no 3D, no libraries, no images).
   All characters/props are hand-drawn pixel art with black outlines and
   flat cel-shading, rendered with imageSmoothingEnabled=false for crisp pixels.
   ========================================================================= */

/* -------------------- Web Audio Retro SoundFX -------------------- */
class SoundFX {
  constructor(){ this.ctx=null; this.master=null; this.enabled=true; }
  init(){
    if(this.ctx){ if(this.ctx.state==='suspended') this.ctx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC){ this.enabled=false; return; }
    this.ctx = new AC();
    this.master = this.ctx.createGain();
    this.master.gain.value = 0.5;
    this.master.connect(this.ctx.destination);
  }
  tone(freq, dur, type='square', vol=0.15, slideTo=null, delay=0){
    if(!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime + delay;
    const o = this.ctx.createOscillator(), g = this.ctx.createGain();
    o.type = type; o.frequency.setValueAtTime(freq, t);
    if(slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20,slideTo), t+dur);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(vol, t+0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
    o.connect(g).connect(this.master);
    o.start(t); o.stop(t+dur+0.02);
  }
  noise(dur, vol=0.2, delay=0){
    if(!this.enabled || !this.ctx) return;
    const t = this.ctx.currentTime + delay;
    const n = Math.floor(this.ctx.sampleRate*dur);
    const buf = this.ctx.createBuffer(1, n, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<n;i++){ d[i] = (Math.random()*2-1) * (1 - i/n); }
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const g = this.ctx.createGain(); g.gain.value = vol;
    src.connect(g).connect(this.master); src.start(t);
  }
  jump(){ this.tone(420,0.11,'square',0.10,720); }
  pickup(){ this.tone(880,0.08,'triangle',0.12,1320); this.tone(1320,0.06,'triangle',0.08,1760,0.05); }
  chili(){ this.tone(280,0.18,'sawtooth',0.13,820); }
  skill(){ this.tone(620,0.22,'sine',0.13,180); }
  fever(){ [523,659,784,1046].forEach((f,i)=> this.tone(f,0.12,'square',0.13,null,i*0.08)); }
  giant(){ this.tone(160,0.3,'sawtooth',0.14,420); }
  smash(){ this.noise(0.18,0.22); this.tone(200,0.15,'square',0.12,80); }
  crash(){ this.noise(0.22,0.25); this.tone(160,0.2,'square',0.14,60); }
  lose(){ [440,349,262,196].forEach((f,i)=> this.tone(f,0.22,'square',0.14,null,i*0.14)); this.noise(0.3,0.15,0.5); }
  win(){ [523,659,784,1046,1318].forEach((f,i)=> this.tone(f,0.16,'square',0.15,null,i*0.11)); this.tone(1046,0.4,'triangle',0.14,null,0.55); }
}
const sfx = new SoundFX();

/* -------------------- Persistence -------------------- */
const LS = {
  get(k, def){ try{ const v=localStorage.getItem(k); return v===null?def:JSON.parse(v); }catch(e){ return def; } },
  set(k, v){ try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
};

/* -------------------- Skins / Gacha -------------------- */
// body = 고양이 무늬(fur patch), cloth = 한복 저고리, horn = 갓(hat)
const SKINS = [
  { id:'default',  name:'삼색 고양이', rarity:'C',   body:0xe8a95c, cloth:0xff9aa2, horn:0x2a2530 },
  { id:'cheese',   name:'치즈 고양이', rarity:'C',   body:0xf0b45a, cloth:0xffe08a, horn:0x2a2530 },
  { id:'gray',     name:'회색 고양이', rarity:'C',   body:0xa9adbd, cloth:0xa0c4ff, horn:0x2a2530 },
  { id:'black',    name:'까망 고양이', rarity:'C',   body:0x5a5560, cloth:0xb5ead7, horn:0x2a2530 },
  { id:'sky',      name:'하늘 한복 고양이', rarity:'R', body:0xe8a95c, cloth:0x9ec5ff, horn:0x2a2530 },
  { id:'sakura',   name:'벚꽃 한복 고양이', rarity:'R', body:0xf7d0c0, cloth:0xff7ea8, horn:0x2a2530 },
  { id:'forest',   name:'먹빛 선비 고양이', rarity:'R', body:0x6e4a30, cloth:0x3c8f5a, horn:0x2a2530 },
  { id:'gold',     name:'황금 고양이', rarity:'SSR', body:0xffd24a, cloth:0xffb300, horn:0x3a2f10 },
  { id:'rainbow',  name:'무지개 한복 고양이', rarity:'SSR', body:0xf7f3ea, cloth:0xff9ac4, horn:0x2a2530, rainbow:true },
];
const RARITY_LABEL = { C:'COMMON', R:'RARE', SSR:'SSR' };

/* -------------------- Colour helpers -------------------- */
function C(n){ return '#'+(n>>>0).toString(16).padStart(6,'0').slice(-6); }
function darken(hex, f){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.max(0,r*f|0); g=Math.max(0,g*f|0); b=Math.max(0,b*f|0);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
function lighten(hex, f){
  const n=parseInt(hex.slice(1),16); let r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  r=Math.min(255,r+(255-r)*f|0); g=Math.min(255,g+(255-g)*f|0); b=Math.min(255,b+(255-b)*f|0);
  return '#'+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);
}
const OUTLINE = '#221b2b';

/* =========================================================================
   PIXEL-ART SPRITE FACTORY
   Each sprite is drawn on a small canvas (1 unit = 1 pixel) then wrapped with
   a solid black outline. Rendered scaled by an integer factor with smoothing
   OFF, so every pixel stays a crisp square.
   ========================================================================= */
function outlineCanvas(src, col, t){
  col = col||OUTLINE; t = t||1;
  const W=src.width+2*t, H=src.height+2*t;
  const sil=document.createElement('canvas'); sil.width=src.width; sil.height=src.height;
  const sc=sil.getContext('2d'); sc.imageSmoothingEnabled=false;
  sc.drawImage(src,0,0); sc.globalCompositeOperation='source-in';
  sc.fillStyle=col; sc.fillRect(0,0,sil.width,sil.height);
  const out=document.createElement('canvas'); out.width=W; out.height=H;
  const oc=out.getContext('2d'); oc.imageSmoothingEnabled=false;
  for(let dx=-t;dx<=t;dx++) for(let dy=-t;dy<=t;dy++){ if(dx||dy) oc.drawImage(sil, t+dx, t+dy); }
  oc.drawImage(src, t, t);
  return out;
}
// build an outlined sprite from a draw callback that uses P(x,y,w,h,color)
function makeSprite(W, H, draw, outlineT){
  const c=document.createElement('canvas'); c.width=W; c.height=H;
  const g=c.getContext('2d'); g.imageSmoothingEnabled=false;
  const P=(x,y,w,h,col)=>{ g.fillStyle=col; g.fillRect(x|0,y|0,w|0,h|0); };
  draw(P,g);
  return outlineCanvas(c, OUTLINE, outlineT||1);
}
// tinted copy (flat colour wash over opaque pixels) — used for ghost / fever flash
const tintCache = new Map();
function tinted(src, color, amount){
  const key = src.__id + '|' + color + '|' + amount;
  if(tintCache.has(key)) return tintCache.get(key);
  const c=document.createElement('canvas'); c.width=src.width; c.height=src.height;
  const g=c.getContext('2d'); g.imageSmoothingEnabled=false;
  g.drawImage(src,0,0);
  g.globalCompositeOperation='source-atop';
  g.globalAlpha=amount; g.fillStyle=color; g.fillRect(0,0,c.width,c.height);
  tintCache.set(key,c); return c;
}
let __spriteId=0;
function tagId(cv){ cv.__id = ++__spriteId; return cv; }

/* ---------- Character: chibi calico cat in hanbok (recolour per skin) ---------- */
// Big round head (~60% of body), huge sparkly eyes, black outline, cel shading.
function drawHero(skin){
  const fur='#f9f5ec', furS='#dfd8c8';
  const patch=C(skin.body), patchS=darken(patch,0.78);
  const cloth=C(skin.cloth), clothS=darken(cloth,0.8);
  const pants='#3b4270', pantsS='#2c3358';
  const hat=C(skin.horn), hatS=darken(hat,0.65);
  const eye='#2a2530', eyeW='#ffffff', pink='#ff8f88', blush='#ffbcc8';
  const stick='#9a6a3c', tteA='#fff3e6', tteB='#e56b4d';
  return tagId(makeSprite(46, 54, (P)=>{

const COL_MIN=-7, COL_MAX=7;      // playable columns

/* -------------------- Canvas / camera (2D oblique top-down) -------------------- */
const canvas = document.getElementById('game-canvas');
const ctx = canvas.getContext('2d');
let W=0,H=0,DPR=1, PX=4, CELL=64, ROW_H=54, originX=0, originY=0;
const ART_TILE=16;
function resize(){
  DPR = Math.min(window.devicePixelRatio||1, 2);
  W = Math.floor(window.innerWidth*DPR);
  H = Math.floor(window.innerHeight*DPR);
  canvas.width=W; canvas.height=H;
  canvas.style.width=window.innerWidth+'px';
  canvas.style.height=window.innerHeight+'px';
  PX = Math.max(2, Math.floor(W/(15*ART_TILE)));    // ~15 tiles across
  CELL = ART_TILE*PX;
  ROW_H = Math.round(CELL*0.86);                     // slight vertical squash -> oblique feel
  originX = Math.round(W/2);
  originY = Math.round(H*0.66);
  ctx.imageSmoothingEnabled=false;
}
window.addEventListener('resize', resize);

// projection helpers (world tile -> screen px). row increases forward (up screen).
function sxOf(col){ return originX + col*CELL; }
function gyOf(row){ return originY - (row - run.camRow)*ROW_H; }

/* draw a pixel sprite anchored bottom-centre at (col,row), lifted by hop (tiles) */
function blit(spr, col, row, hTiles, opt){
  opt = opt||{};
  const sx = Math.round(sxOf(col));
  const gy = Math.round(gyOf(row));
  const drawH = Math.round(hTiles*CELL);
  const drawW = Math.round(drawH * spr.width/spr.height);
  const hop = Math.round((opt.hop||0)*CELL);
  const dx = Math.round(sx - drawW/2);
  const dy = gy - drawH - hop + Math.round(opt.yoff? opt.yoff*CELL : 0);
  let img = spr;
  if(opt.tint) img = tinted(spr, opt.tint, opt.tintAmt||0.5);
  ctx.save();
  ctx.imageSmoothingEnabled=false;
  if(opt.alpha!=null) ctx.globalAlpha=opt.alpha;
  if(opt.flip){ ctx.translate(sx,0); ctx.scale(-1,1); ctx.drawImage(img, Math.round(-drawW/2), dy, drawW, drawH); }
  else ctx.drawImage(img, dx, dy, drawW, drawH);
  ctx.restore();
}
function drawShadow(col, row, radiusTiles, k, alpha){
  const sx=Math.round(sxOf(col)), gy=Math.round(gyOf(row));
  const rx=radiusTiles*CELL*k, ry=rx*0.42;
  ctx.save(); ctx.globalAlpha=alpha!=null?alpha:0.28; ctx.fillStyle='#1a1526';
  ctx.beginPath(); ctx.ellipse(sx, gy, Math.max(2,rx), Math.max(1,ry), 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

/* -------------------- Lanes -------------------- */
let lanes = {};
let feverActive=false;
function rowRand(row, salt){ let x=Math.sin(row*127.1 + (salt||0)*311.7)*43758.5453; return x-Math.floor(x); }

const LANE = {
  grass:{ a:'#8fd07f', b:'#7fc06f', edge:'#a8e197' },
  dirt: { a:'#d3a367', b:'#c6975a', edge:'#e2b77e' },
  stone:{ a:'#bcc0d0', b:'#adb2c6', edge:'#d2d5e2' },
  river:{ a:'#3f8fe0', b:'#357fd0', edge:'#82c2f6' },
  gate: { a:'#8fd07f', b:'#7fc06f', edge:'#a8e197' },
};

function makeLane(row){
  let type;
  if(currentGameMode==='timeattack'){
    if(row<=3) type='grass';
    else if(row>=TA_GOAL) type='gate';
    else { const r=rowRand(row,1); type = r<0.44?'grass' : r<0.68?'dirt' : r<0.88?'stone' : 'river'; }
  } else {
    if(row<=3) type='grass';
    else { const r=Math.random(); type = r<0.40?'grass' : r<0.64?'dirt' : r<0.88?'stone' : 'river'; }
  }
  if(type==='river' && lanes[row-1] && lanes[row-1].type==='river') type='grass';

  const lane = { row, type, dir:1, speed:0, mobs:[], statics:{}, items:{}, isGate:type==='gate' };
  const rnd = s => (currentGameMode==='timeattack') ? rowRand(row,s) : Math.random();

  // static obstacles on grass
  if(type==='grass'){
    if(row>4){
      const density = currentGameMode==='timeattack'?0.18:0.22;
      let used=0;
      for(let x=COL_MIN;x<=COL_MAX;x++){
        if(rnd(x*7+3) < density && used < (COL_MAX-COL_MIN-1)){
          used++;
          const kind = (rnd(x*13)<0.5)?'tree':'rock';
          lane.statics[x] = { kind, solid:true };
        }
      }
    }
  }
  // moving obstacles on roads
  if(type==='dirt' || type==='stone'){
    const dir=(rowRand(row,5)<0.5)?1:-1;
    lane.dir=dir; lane.speed = 1.5 + rowRand(row,9)*1.9;
    const count = 2 + Math.floor(rowRand(row,11)*2);
    const gap = (2*(COL_MAX+3))/count;
    for(let i=0;i<count;i++){
      const isPal = (type==='dirt');
      lane.mobs.push({ x:-(COL_MAX+3)+i*gap+rowRand(row,i*3)*1.5, kind:isPal?'palanquin':'guard',
        w: isPal?2.2:1.0, flip:dir<0, dead:false });
    }
  }
  // turtles on rivers
  if(type==='river'){
    const dir=(rowRand(row,7)<0.5)?1:-1;
    lane.dir=dir; lane.speed = 1.0 + rowRand(row,3)*0.9;
    const count = 4 + Math.floor(rowRand(row,4)*2);
    const gap = (2*(COL_MAX+3))/count;
    for(let i=0;i<count;i++){
      lane.mobs.push({ x:-(COL_MAX+3)+i*gap+rowRand(row,i*5)*1.2, kind:'turtle', w:1.9, flip:dir<0, dead:false });
    }
  }
  // item spawn balancer: none in first 10 lanes, then <=1 per lane, thinning out
  if(row>ITEM_SAFE_ROWS && type!=='river' && type!=='gate'){
    const chance = Math.max(0.30, 0.55 - (row-ITEM_SAFE_ROWS)*0.0006);
    if(rnd(101) < chance){
      const cols=[]; for(let x=COL_MIN;x<=COL_MAX;x++){ if(!lane.statics[x] && !lane.items[x]) cols.push(x); }
      if(cols.length){
        const x=cols[(rnd(202)*cols.length)|0];
        const r=rnd(303);
        const kind = r<0.68?'tteok' : r<0.88?'chili' : 'giant';
        lane.items[x]={ kind, taken:false };
      }
    }
  }
  return lane;
}

/* -------------------- Player / run -------------------- */
const P = { gridX:0, row:0, worldX:0, worldZ:0, jumping:false, jT:0, jDur:0.14,
  fromX:0, fromRow:0, toX:0, toRow:0, ridingTurtle:null, alive:true, facing:1, hop:0 };

const run = {
  score:0, maxRow:0, fever:0, feverTimer:0, giantTimer:0, chiliTimer:0,
  stealthTimer:0, stealthCd:0, idleTimer:0, autoScrollRow:0, camRow:0,
  elapsed:0, taTimeLeft:TA_TIME, finished:false, path:[],
  ghostPath:null, ghostIndex:0, ghostRow:0, ghostFinalRow:0, ghostDone:false, eagle:null,
};
const SKILL_CD=15, STEALTH_DUR=2, FEVER_DUR=5, GIANT_DUR=4, CHILI_DUR=3;

function resetPlayer(){
  P.gridX=0; P.row=0; P.worldX=0; P.worldZ=0; P.jumping=false; P.jT=0; P.jDur=0.14;
  P.ridingTurtle=null; P.alive=true; P.facing=1; P.hop=0;
}

/* -------------------- Movement -------------------- */
function canEnter(row, x){
  if(x<COL_MIN || x>COL_MAX) return false;
  const lane=lanes[row]; if(!lane) return true;
  if(run.stealthTimer>0) return true;
  const st=lane.statics[x];
  if(st && st.solid){
    if(run.giantTimer>0){ smashStatic(lane,x); return true; }
    return false;
  }
  return true;
}
function smashStatic(lane,x){
  if(!lane.statics[x]) return;
  burstSparkle(x, lane.row, '#bfa27a', 10);
  delete lane.statics[x]; sfx.smash();
}
function tryMove(dx, drow){
  if(!P.alive || gameState!==State.PLAYING || P.jumping) return;
  const targetRow=P.row+drow;
  const baseX = P.ridingTurtle ? Math.round(P.worldX) : P.gridX;
  const targetX = baseX+dx;
  if(!canEnter(targetRow, targetX)) return;
  P.ridingTurtle=null;
  P.fromX=P.worldX; P.fromRow=P.worldZ;
  P.toX=targetX; P.toRow=targetRow;
  P.gridX=targetX; P.row=targetRow;
  P.jumping=true; P.jT=0;
  P.jDur = 0.14 / (run.chiliTimer>0?1.5:1);
  if(dx>0) P.facing=1; else if(dx<0) P.facing=-1;
  burstDust(P.fromX, P.fromRow);
  if(dx!==0){ motionTrail(P.fromX, P.fromRow); motionTrail((P.fromX+P.toX)/2, P.fromRow); }
  sfx.jump(); run.idleTimer=0;
}
function finishJump(){
  P.jumping=false; P.worldX=P.toX; P.worldZ=P.toRow; P.hop=0;
  if(P.row>run.maxRow) run.maxRow=P.row;
  recordPath();
  resolveLanding();
}
function resolveLanding(){
  const lane=lanes[P.row]; if(!lane) return;
  const it=lane.items[P.gridX];
  if(it && !it.taken) collectItem(lane, it, P.gridX);
  if(lane.type==='river'){
    let onT=null;
    for(const m of lane.mobs){ if(m.kind==='turtle' && Math.abs(m.x-P.worldX) < (m.w/2+0.35)){ onT=m; break; } }
    if(onT) P.ridingTurtle=onT;
    else if(run.stealthTimer<=0 && !feverActive) die('drown');
  }
  if(lane.type==='dirt'||lane.type==='stone') checkVehicleCollision(lane);
  if(currentGameMode==='timeattack' && P.row>=TA_GOAL && !run.finished) timeAttackWin();
}
function collectItem(lane, it, x){
  it.taken=true; delete lane.items[x];
  if(it.kind==='tteok'){ store.tteok++; addFever(10); burstSparkle(x, lane.row, '#ffd36e', 8); sfx.pickup(); }
  else if(it.kind==='chili'){ run.chiliTimer=CHILI_DUR; burstSparkle(x, lane.row, '#e5484d', 10); sfx.chili(); showToast('매운 고추! 점프 가속!'); }
  else if(it.kind==='giant'){ run.giantTimer=GIANT_DUR; burstSparkle(x, lane.row, '#ffd36e', 14); sfx.giant(); showToast('거대화! 장애물 격파!'); }
  updateHUD();
}
function addFever(a){ if(feverActive) return; run.fever=Math.min(100, run.fever+a); if(run.fever>=100) startFever(); }
function startFever(){ feverActive=true; run.feverTimer=FEVER_DUR; run.fever=100;
  document.getElementById('fever-wrap').classList.add('on'); sfx.fever(); showToast('피버 모드! 무적!'); }
function endFever(){ feverActive=false; run.fever=0; run.feverTimer=0;
  document.getElementById('fever-wrap').classList.remove('on'); }

function useSkill(){
  if(gameState!==State.PLAYING || !P.alive || run.stealthCd>0) return;
  run.stealthTimer=STEALTH_DUR; run.stealthCd=SKILL_CD; sfx.skill(); showToast('은신!');
}

/* -------------------- Collision -------------------- */
function checkVehicleCollision(lane){
  if(!P.alive || run.stealthTimer>0 || feverActive) return;
  for(const m of lane.mobs){
    if(m.dead || m.kind==='turtle') continue;
    if(Math.abs(m.x - P.worldX) < (m.w/2 + 0.35)){
      if(run.giantTimer>0){ m.dead=true; burstSparkle(m.x, lane.row, '#ff9aa2', 14); sfx.smash(); }
      else die('crash');
      return;
    }
  }
}
function die(reason){
  if(!P.alive || run.finished) return;
  P.alive=false; sfx.crash();
  if(reason==='eagle') spawnEagle();
  setTimeout(()=> endRun(false, reason), reason==='eagle'?700:450);
}
function spawnEagle(){ run.eagle={ col:P.worldX, row:P.row, y:7, t:0 }; }

/* -------------------- Ghost replay -------------------- */
function recordPath(){ if(currentGameMode==='infinite'||currentGameMode==='ghost') run.path.push({ t:+run.elapsed.toFixed(3), x:P.gridX, row:P.row }); }
function saveGhostIfRecord(){
  if(currentGameMode!=='infinite') return false;
  if(run.score>store.highScore){ store.highScore=run.score; LS.set('infinite_highscore', store.highScore); LS.set('ghost_replay_path', run.path); return true; }
  return false;
}
function loadGhost(){
  const path=LS.get('ghost_replay_path', null);
  if(!path || path.length<2){ run.ghostPath=null; return; }
  run.ghostPath=path; run.ghostFinalRow=path[path.length-1].row; run.ghostIndex=0;
  run.ghostCol=0; run.ghostRowF=0; run.ghostHop=0; run.ghostFacing=1;
}
function updateGhost(){
  if(!run.ghostPath) return;
  const path=run.ghostPath, t=run.elapsed;
  if(t>=path[path.length-1].t){ const L=path[path.length-1]; run.ghostCol=L.x; run.ghostRowF=L.row; run.ghostHop=0; run.ghostRow=L.row; run.ghostDone=true; return; }
  let i=run.ghostIndex; while(i<path.length-1 && path[i+1].t<=t) i++; run.ghostIndex=i;
  const a=path[i], b=path[i+1]; const span=Math.max(0.0001,b.t-a.t); const k=Math.min(1,(t-a.t)/span);
  run.ghostCol=a.x+(b.x-a.x)*k; run.ghostRowF=a.row+(b.row-a.row)*k;
  run.ghostHop=Math.sin(Math.min(1,k)*Math.PI)*0.55; run.ghostRow=run.ghostRowF;
  if(b.x>a.x) run.ghostFacing=1; else if(b.x<a.x) run.ghostFacing=-1;
}

/* -------------------- Particles (2D pixel) -------------------- */
const particles=[];
const MAX_PARTICLES=280;
function addParticle(p){ if(particles.length<MAX_PARTICLES) particles.push(p); }
function burstDust(col,row){
  const n=4+(Math.random()*3|0);
  for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2;
    addParticle({ type:'box', col, row, y:0.15, vcol:Math.cos(a)*0.9, vrow:Math.sin(a)*0.5, vy:1.0, grav:3.5,
      life:0.32, max:0.32, size:0.16, color: Math.random()<0.5?'#ffffff':'#d8d0dc' }); }
}
function burstSparkle(col,row,color,count){
  const n=count||8;
  for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2;
    addParticle({ type:'box', col, row, y:0.6+Math.random()*0.4, vcol:Math.cos(a)*1.3, vrow:Math.sin(a)*0.8, vy:2.2+Math.random()*1.5, grav:7,
      life:0.5, max:0.5, size:0.14, color }); }
}
function motionTrail(col,row){
  addParticle({ type:'ghost', col, row, y:0, life:0.16, max:0.16, flip:P.facing<0 });
}
function feverHalo(){
  if(Math.random()<0.6){ const a=Math.random()*Math.PI*2;
    const hue=(Math.random()*360)|0;
    addParticle({ type:'box', col:P.worldX+Math.cos(a)*0.4, row:P.worldZ, y:0.7+Math.random()*0.6, vcol:0, vrow:0, vy:1.6, grav:1.5,
      life:0.5, max:0.5, size:0.13, color:`hsl(${hue},80%,68%)` }); }
}
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.life-=dt;
    if(p.life<=0){ particles.splice(i,1); continue; }
    if(p.type==='box'){ p.vy-=p.grav*dt; p.col+=p.vcol*dt; p.row+=p.vrow*dt; p.y+=p.vy*dt; if(p.y<0)p.y=0; }
  }
}
function renderParticles(){
  const heroSpr = heroSprite(currentSkin());
  for(const p of particles){
    const sx=Math.round(sxOf(p.col)), gy=Math.round(gyOf(p.row));
    const k=p.life/p.max;
    if(p.type==='box'){
      const s=Math.max(2, Math.round(p.size*CELL*(0.5+k*0.5)));
      ctx.globalAlpha=Math.min(1,k*1.2); ctx.fillStyle=p.color;
      ctx.fillRect(sx-(s>>1), Math.round(gy - p.y*CELL)-(s>>1), s, s);
      ctx.globalAlpha=1;
    } else { // ghost trail = fading blue hero
      blit(heroSpr, p.col, p.row, 1.9, { alpha:0.4*k, tint:'#7fb0ff', tintAmt:0.6, flip:p.flip });
    }
  }
}

/* -------------------- World update -------------------- */
function visibleRowRange(){
  const from = Math.floor(run.camRow + (originY - H - CELL)/ROW_H);
  const to   = Math.ceil (run.camRow + (originY + CELL)/ROW_H);
  return [from, to];
}
function ensureLanes(){
  let [from,to]=visibleRowRange();
  from-=1; to+=3;
  if(currentGameMode==='timeattack') to=Math.min(to, TA_GOAL);
  for(let r=from;r<=to;r++){ if(r>=0 && !lanes[r]) lanes[r]=makeLane(r); }
  for(const k in lanes){ if(+k < from-2) delete lanes[k]; }
}
function gameSpeedMul(){ return Math.min(2.6, 1 + Math.floor(run.score/10)*0.05); }

function updateMobs(dt){
  const slow=feverActive?0.5:1, mul=gameSpeedMul();
  for(const k in lanes){
    const lane=lanes[k]; if(!lane.mobs.length) continue;
    const spd=lane.speed*lane.dir*slow*mul;
    for(const m of lane.mobs){
      if(m.dead) continue;
      m.x+=spd*dt;
      if(m.x>COL_MAX+3){ m.x=-(COL_MAX+3); } else if(m.x<-(COL_MAX+3)){ m.x=COL_MAX+3; }
    }
    if(!P.jumping && P.alive && lane.row===P.row && (lane.type==='dirt'||lane.type==='stone')) checkVehicleCollision(lane);
  }
}
function updateRiding(){
  if(!P.ridingTurtle) return;
  const m=P.ridingTurtle; if(m.dead){ P.ridingTurtle=null; return; }
  P.worldX=m.x; P.gridX=Math.round(P.worldX);
  if(P.worldX>COL_MAX+0.5 || P.worldX<COL_MIN-0.5){ if(run.stealthTimer<=0 && !feverActive) die('drown'); }
}
function updatePlayerAnim(dt){
  if(P.jumping){
    P.jT+=dt; const k=Math.min(1,P.jT/P.jDur);
    P.worldX=P.fromX+(P.toX-P.fromX)*k;
    P.worldZ=P.fromRow+(P.toRow-P.fromRow)*k;
    P.hop=Math.sin(k*Math.PI)*0.6;
    if(k>=1) finishJump();
  } else {
    if(P.ridingTurtle) P.worldZ=P.row;
    P.hop=Math.sin(run.elapsed*4)*0.03;
  }
  if(feverActive) feverHalo();
}
function updateCamera(dt){
  if(currentGameMode==='infinite'||currentGameMode==='ghost') run.autoScrollRow += 0.75*gameSpeedMul()*dt;
  let target = Math.max(P.worldZ, run.autoScrollRow);
  if(currentGameMode==='timeattack') target = P.worldZ;
  run.camRow += (target - run.camRow) * Math.min(1, dt*5);
}
function checkLoseConditions(dt){
  if(!P.alive || run.finished) return;
  if(currentGameMode==='infinite'||currentGameMode==='ghost'){
    run.idleTimer+=dt;
    if(run.idleTimer>5){ die('eagle'); return; }
    if(P.row < run.autoScrollRow-6){ die('eagle'); return; }
  }
  if(currentGameMode==='ghost' && run.ghostPath){
    if(P.row > run.ghostFinalRow){ ghostRaceWin(); return; }
    if(run.ghostRow - P.row > 8){ die('ghost_far'); return; }
  }
}
function timeAttackWin(){
  run.finished=true; const left=run.taTimeLeft;
  let g='C'; if(left>=15)g='SSS'; else if(left>=10)g='SS'; else if(left>=5)g='A'; else if(left>=2)g='B';
  sfx.win(); setTimeout(()=> endRun(true,'ta_clear',{grade:g,left}), 400);
}
function ghostRaceWin(){ run.finished=true; sfx.win(); setTimeout(()=> endRun(true,'ghost_win'), 400); }
function updateTimers(dt){
  if(run.stealthCd>0) run.stealthCd=Math.max(0,run.stealthCd-dt);
  if(run.stealthTimer>0) run.stealthTimer=Math.max(0,run.stealthTimer-dt);
  if(run.chiliTimer>0) run.chiliTimer=Math.max(0,run.chiliTimer-dt);
  if(run.giantTimer>0) run.giantTimer=Math.max(0,run.giantTimer-dt);
  if(feverActive){ run.feverTimer-=dt; if(run.feverTimer<=0) endFever(); }
  if(currentGameMode==='timeattack' && !run.finished){ run.taTimeLeft-=dt; if(run.taTimeLeft<=0){ run.taTimeLeft=0; die('timeout'); } }
}
function updateEagle(dt){
  if(!run.eagle) return;
  const e=run.eagle; e.t+=dt;
  e.y += (0.15 - e.y)*Math.min(1,dt*4);
  e.col += (P.worldX - e.col)*Math.min(1,dt*4);
  e.row += (P.row - e.row)*Math.min(1,dt*4);
}

/* -------------------- RENDER -------------------- */
function drawGround(){
  const [from,to]=visibleRowRange();
  const leftCol = Math.floor((0-originX)/CELL)-1;
  const rightCol = Math.ceil((W-originX)/CELL)+1;
  for(let row=to; row>=from; row--){
    const lane = lanes[row];
    const type = lane?lane.type:'grass';
    const col = LANE[type]||LANE.grass;
    const gy=Math.round(gyOf(row));
    const top=gy-Math.round(ROW_H/2);
    // base band
    ctx.fillStyle=col.a; ctx.fillRect(0, top, W, ROW_H+1);
    // checker per column
    ctx.fillStyle=col.b;
    for(let c=leftCol;c<=rightCol;c++){ if(((c+row)&1)===0){ ctx.fillRect(Math.round(sxOf(c)-CELL/2), top, CELL+1, ROW_H+1); } }
    // top edge highlight (oblique 2.5D lip)
    ctx.fillStyle=col.edge; ctx.fillRect(0, top, W, Math.max(2,PX));
    // river ripple dither
    if(type==='river'){
      ctx.fillStyle=lighten(col.a,0.25);
      for(let c=leftCol;c<=rightCol;c++){ if(((c*3+row*2 + (run.elapsed*3|0))%5)===0){ ctx.fillRect(Math.round(sxOf(c)-CELL/4), top+Math.round(ROW_H*0.45), Math.max(2,PX*2), Math.max(2,PX)); } }
    }
    // playfield boundary posts (subtle)
    if(type!=='river'){
      ctx.fillStyle='rgba(0,0,0,0.06)';
      ctx.fillRect(Math.round(sxOf(COL_MIN-0.5)), top, PX, ROW_H+1);
      ctx.fillRect(Math.round(sxOf(COL_MAX+0.5)), top, PX, ROW_H+1);
    }
    // fever neon overlay
    if(feverActive){
      const hue=((run.elapsed*120 + row*24)%360)|0;
      ctx.globalAlpha=0.28; ctx.fillStyle=`hsl(${hue},90%,65%)`;
      ctx.fillRect(0, top, W, ROW_H+1); ctx.globalAlpha=1;
    }
  }
}
function collectDrawables(){
  const list=[];
  const [from,to]=visibleRowRange();
  for(let row=from-1; row<=to+2; row++){
    const lane=lanes[row]; if(!lane) continue;
    // gate
    if(lane.isGate) list.push({ row, kind:'gate' });
    // statics
    for(const x in lane.statics){ list.push({ row, col:+x, kind:'static', s:lane.statics[x] }); }
    // items
    for(const x in lane.items){ const it=lane.items[x]; if(!it.taken) list.push({ row, col:+x, kind:'item', it }); }
    // mobs
    for(const m of lane.mobs){ if(!m.dead) list.push({ row, col:m.x, kind:'mob', m }); }
  }
  // ghost
  if(currentGameMode==='ghost' && run.ghostPath) list.push({ row:run.ghostRowF, col:run.ghostCol, kind:'ghost' });
  // player
  if(P.alive || run.eagle) list.push({ row:P.worldZ, col:P.worldX, kind:'player' });
  // eagle above player
  if(run.eagle) list.push({ row:run.eagle.row, col:run.eagle.col, kind:'eagle' });
  // far rows first (higher row drawn first)
  list.sort((a,b)=> b.row - a.row);
  return list;
}
function drawEntity(d){
  if(d.kind==='gate'){ blit(SPR.gate, 0, d.row, 4.4, {}); return; }
  if(d.kind==='static'){
    const spr = d.s.kind==='tree'?SPR.tree:SPR.rock;
    const h = d.s.kind==='tree'?2.0:1.0;
    drawShadow(d.col, d.row, h*0.32, 1, 0.25);
    blit(spr, d.col, d.row, h, {});
    return;
  }
  if(d.kind==='item'){
    const spr = d.it.kind==='tteok'?SPR.tteok : d.it.kind==='chili'?SPR.chili : SPR.giant;
    const bob = 0.14 + Math.sin(run.elapsed*3 + d.col)*0.1;
    drawShadow(d.col, d.row, 0.28, 1, 0.22);
    blit(spr, d.col, d.row, 0.95, { hop:bob });
    return;
  }
  if(d.kind==='mob'){
    const m=d.m;
    const spr = m.kind==='palanquin'?SPR.palanquin : m.kind==='turtle'?SPR.turtle : SPR.guard;
    const h = m.kind==='palanquin'?1.7 : m.kind==='turtle'?1.05 : 1.55;
    drawShadow(m.x, d.row, (spr.width/spr.height)*h*0.32, 1, 0.25);
    blit(spr, m.x, d.row, h, { flip:m.flip });
    return;
  }
  if(d.kind==='ghost'){
    const spr=heroSprite(currentSkin());
    drawShadow(run.ghostCol, run.ghostRowF, 0.5, 1, 0.18);
    blit(spr, run.ghostCol, run.ghostRowF, 1.9, { hop:run.ghostHop, alpha:0.55, tint:'#7fb0ff', tintAmt:0.55, flip:run.ghostFacing<0 });
    return;
  }
  if(d.kind==='player'){
    const spr=heroSprite(currentSkin());
    const giant = run.giantTimer>0?2.4:1;
    let hop=Math.max(0,P.hop);
    if(run.eagle) return; // drawn by eagle group
    const shK = Math.max(0.4, 1-hop*0.5)*giant;
    drawShadow(P.worldX, P.worldZ, 0.5, shK, 0.3);
    let opt={ hop, flip:P.facing<0 };
    if(run.stealthTimer>0) opt.alpha=0.4;
    if(feverActive && (Math.floor(run.elapsed*12)&1)) { opt.tint='#ffe37a'; opt.tintAmt=0.5; }
    blit(spr, P.worldX, P.worldZ, 1.9*giant, opt);
    return;
  }
  if(d.kind==='eagle'){
    const e=run.eagle;
    // carry the player in the talons
    const spr=heroSprite(currentSkin());
    blit(spr, e.col, e.row, 1.7, { hop:e.y-0.2, alpha:0.95 });
    blit(SPR.eagle, e.col, e.row, 1.6, { hop:e.y+0.6 });
    return;
  }
}
function render(){
  ctx.imageSmoothingEnabled=false;
  // sky background
  ctx.fillStyle = feverActive ? '#2a2440' : '#cdeafe';
  ctx.fillRect(0,0,W,H);
  // soft top gradient band
  const grd=ctx.createLinearGradient(0,0,0,H*0.5);
  grd.addColorStop(0, feverActive?'#3a2f5a':'#ffe8ef'); grd.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle=grd; ctx.fillRect(0,0,W,H*0.5);
  drawGround();
  const list=collectDrawables();
  for(const d of list) drawEntity(d);
  renderParticles();
}

/* -------------------- Main loop -------------------- */
let last=0;
function frame(ts){
  requestAnimationFrame(frame);
  const dt = last? Math.min(0.05,(ts-last)/1000) : 0.016; last=ts;
  if(gameState===State.PLAYING){
    run.elapsed+=dt;
    ensureLanes();
    updateTimers(dt);
    updateMobs(dt);
    if(!P.jumping) updateRiding();
    updatePlayerAnim(dt);
    if(currentGameMode==='ghost') updateGhost();
    checkLoseConditions(dt);
    updateCamera(dt);
    updateEagle(dt);
    run.score=run.maxRow;
    updateHUD();
  }
  updateParticles(dt);
  if(gameState===State.PLAYING || gameState===State.RESULT) render();
}

/* -------------------- HUD / toast -------------------- */
const el=id=>document.getElementById(id);
function updateHUD(){
  el('hud-score').textContent=run.score;
  el('hud-tteok').textContent=store.tteok;
  el('fever-fill').style.width=(feverActive?100:run.fever)+'%';
  const sb=el('skill-btn'), cd=el('skill-cd');
  if(run.stealthCd>0){ sb.classList.add('cool'); cd.textContent=Math.ceil(run.stealthCd)+'초'; }
  else { sb.classList.remove('cool'); cd.textContent='준비'; }
  if(currentGameMode==='timeattack'){
    const tb=el('timer-box'); tb.classList.remove('hidden');
    el('hud-time').textContent=Math.ceil(run.taTimeLeft);
    tb.classList.toggle('warn', run.taTimeLeft<=10);
  }
  if(currentGameMode==='ghost' && run.ghostPath){
    el('ghost-box').classList.remove('hidden');
    el('hud-ghost').textContent=Math.round(run.ghostRow-P.row);
  }
}
let toastTimer=null;
function showToast(msg){ const t=el('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1100); }

/* -------------------- Start / End -------------------- */
function clearWorld(){ lanes={}; particles.length=0; run.eagle=null; }
function startRun(mode){
  currentGameMode=mode; sfx.init(); clearWorld();
  Object.assign(run, { score:0, maxRow:0, fever:0, feverTimer:0, giantTimer:0, chiliTimer:0,
    stealthTimer:0, stealthCd:0, idleTimer:0, autoScrollRow:0, camRow:0, elapsed:0,
    taTimeLeft:TA_TIME, finished:false, path:[], ghostPath:null, ghostIndex:0, ghostRow:0,
    ghostFinalRow:0, ghostDone:false, eagle:null, ghostCol:0, ghostRowF:0, ghostHop:0, ghostFacing:1 });
  feverActive=false; document.getElementById('fever-wrap').classList.remove('on');
  resetPlayer(); ensureLanes();
  if(mode==='ghost') loadGhost();
  el('timer-box').classList.toggle('hidden', mode!=='timeattack');
  el('ghost-box').classList.add('hidden');
  if(mode==='ghost' && !run.ghostPath) showToast('저장된 고스트가 없어 자유 주행합니다');
  recordPath();
  gameState=State.PLAYING; showScreen('hud'); updateHUD();
}
function endRun(win, reason, extra){
  if(gameState===State.RESULT) return;
  gameState=State.RESULT; saveStore();
  const head=el('res-headline'), rankBox=el('res-rank'), stats=el('res-stats');
  rankBox.classList.add('hidden'); head.classList.remove('win','lose');
  let statLines=`점수(최고 칸): <b>${run.score}</b><br/>획득한 떡: <b>${store.tteok}</b>개`;
  if(win && reason==='ta_clear'){
    head.textContent='미션 성공!'; head.classList.add('win');
    rankBox.classList.remove('hidden'); rankBox.innerHTML=`최종 등급: <span class="grade">${extra.grade}</span>`;
    statLines=`남은 시간: <b>${extra.left.toFixed(1)}</b>초<br/>`+statLines;
  } else if(win && reason==='ghost_win'){
    head.textContent='신기록 달성!'; head.classList.add('win');
    rankBox.classList.remove('hidden'); rankBox.innerHTML=`<span style="font-size:20px;color:var(--mint-d)">고스트를 이겼습니다!</span>`;
  } else {
    head.classList.add('lose');
    head.textContent = currentGameMode==='timeattack' ? '미션 실패' : '게임 오버';
    const rec=saveGhostIfRecord();
    if(rec) statLines+=`<br/><span style="color:var(--mint-d)">🎉 새로운 최고 기록! 고스트 저장됨</span>`;
    else if(currentGameMode==='infinite') statLines+=`<br/>최고 기록: <b>${store.highScore}</b>칸`;
    sfx.lose();
  }
  stats.innerHTML=statLines; saveStore();
  setTimeout(()=> showScreen('result'), 60);
}

/* -------------------- Screens -------------------- */
function showScreen(which){
  ['menu','hud','gacha','result'].forEach(id=> el(id).classList.toggle('hidden', id!==which));
  if(which==='menu') el('menu-tteok').textContent=store.tteok;
}

/* -------------------- Gacha -------------------- */
function openGacha(){ gameState=State.GACHA; el('gacha-tteok').textContent=store.tteok; el('gacha-result').textContent=''; renderSkinGrid(); showScreen('gacha'); }
function skinThumb(skin){
  const spr=heroSprite(skin);
  const c=document.createElement('canvas'); c.width=48; c.height=48;
  const g=c.getContext('2d'); g.imageSmoothingEnabled=false;
  const s=Math.min(48/spr.width,48/spr.height); const w=Math.round(spr.width*s), h=Math.round(spr.height*s);
  g.drawImage(spr, Math.round((48-w)/2), Math.round((48-h)/2), w, h);
  return c;
}
function renderSkinGrid(){
  const grid=el('skin-grid'); grid.innerHTML='';
  for(const s of SKINS){
    const owned=store.owned.includes(s.id), equipped=store.equipped===s.id;
    const card=document.createElement('div');

      (owned?(equipped?'<div class="st">장착함</div>':`<button class="pbtn mint eqbtn" data-equip="${s.id}">장착하기</button>`):'<div class="st">보유 중 아님</div>');
    card.appendChild(thumb); card.appendChild(cap); grid.appendChild(card);
  }
  grid.querySelectorAll('[data-equip]').forEach(b=> b.addEventListener('click', ()=>{ store.equipped=b.getAttribute('data-equip'); saveStore(); renderSkinGrid(); drawMascot(); sfx.pickup(); }));
}
function rollGacha(){
  sfx.init();
  if(store.tteok<100){ el('gacha-result').innerHTML='<span style="color:var(--peach-d)">떡이 부족합니다!</span>'; return; }
  store.tteok-=100;
  const r=Math.random(); const rarity = r<0.70?'C' : r<0.95?'R' : 'SSR';
  const pool=SKINS.filter(s=>s.rarity===rarity);
  const pick=pool[Math.floor(Math.random()*pool.length)];
  let msg;
  if(store.owned.includes(pick.id)){ store.tteok+=30; msg=`<span class="rr ${rarity}">[${RARITY_LABEL[rarity]}]</span> ${pick.name} (중복! 떡 30개 반환)`; }
  else { store.owned.push(pick.id); msg=`<span class="rr ${rarity}">[${RARITY_LABEL[rarity]}]</span> ${pick.name} 획득!`; rarity==='SSR'?sfx.win():sfx.pickup(); }
  saveStore(); el('gacha-tteok').textContent=store.tteok; el('gacha-result').innerHTML=msg; renderSkinGrid();
}

/* -------------------- Input -------------------- */
function bindInput(){
  document.querySelectorAll('.menu-btns [data-mode]').forEach(b=> b.addEventListener('click', ()=>{ sfx.init(); startRun(b.getAttribute('data-mode')); }));
  el('open-gacha').addEventListener('click', openGacha);
  el('gacha-roll').addEventListener('click', rollGacha);
  el('gacha-close').addEventListener('click', ()=>{ gameState=State.MENU; showScreen('menu'); });
  el('res-retry').addEventListener('click', ()=> startRun(currentGameMode));
  el('res-menu').addEventListener('click', ()=>{ gameState=State.MENU; clearWorld(); showScreen('menu'); });

  window.addEventListener('keydown', e=>{
    if(gameState!==State.PLAYING) return;
    switch(e.key){
      case 'ArrowUp': case 'w': case 'W': tryMove(0,1); e.preventDefault(); break;
      case 'ArrowDown': case 's': case 'S': tryMove(0,-1); e.preventDefault(); break;
      case 'ArrowLeft': case 'a': case 'A': tryMove(-1,0); e.preventDefault(); break;
      case 'ArrowRight': case 'd': case 'D': tryMove(1,0); e.preventDefault(); break;
      case 'Shift': useSkill(); e.preventDefault(); break;
    }
  });
  const dz=(id,dx,dr)=>{ const b=el(id); const h=ev=>{ ev.preventDefault(); tryMove(dx,dr); }; b.addEventListener('touchstart',h,{passive:false}); b.addEventListener('mousedown',h); };
  dz('d-up',0,1); dz('d-down',0,-1); dz('d-left',-1,0); dz('d-right',1,0);
  const skb=el('skill-btn'); const sh=ev=>{ ev.preventDefault(); useSkill(); };
  skb.addEventListener('touchstart',sh,{passive:false}); skb.addEventListener('mousedown',sh);

  let sx=0,sy=0,on=false;
  const st=(x,y)=>{ sx=x;sy=y;on=true; };
  const en=(x,y)=>{ if(!on)return; on=false; if(gameState!==State.PLAYING)return;
    const dx=x-sx,dy=y-sy,ax=Math.abs(dx),ay=Math.abs(dy);
    if(ax<24&&ay<24){ tryMove(0,1); return; }
    if(ax>ay) tryMove(dx>0?1:-1,0); else tryMove(0,dy<0?1:-1); };
  canvas.addEventListener('touchstart', e=>{ const t=e.changedTouches[0]; st(t.clientX,t.clientY); }, {passive:true});
  canvas.addEventListener('touchend', e=>{ const t=e.changedTouches[0]; en(t.clientX,t.clientY); }, {passive:true});
  canvas.addEventListener('mousedown', e=> st(e.clientX,e.clientY));
  canvas.addEventListener('mouseup', e=> en(e.clientX,e.clientY));
}

/* -------------------- Menu mascot -------------------- */
function drawMascot(){
  const c=el('mascot'); const g=c.getContext('2d'); g.imageSmoothingEnabled=false;
  const spr=heroSprite(currentSkin());
  g.clearRect(0,0,64,64);
  const s=Math.min(64/spr.width,64/spr.height); const w=Math.round(spr.width*s), h=Math.round(spr.height*s);
  g.drawImage(spr, Math.round((64-w)/2), Math.round((64-h)/2), w, h);
}

/* -------------------- Boot -------------------- */
function boot(){
  resize();
  buildSprites();
  bindInput();
  drawMascot();
  showScreen('menu');
  el('menu-tteok').textContent=store.tteok;
  const unlock=()=>{ sfx.init(); window.removeEventListener('pointerdown',unlock); };
  window.addEventListener('pointerdown', unlock);
  requestAnimationFrame(frame);
}
boot();
</script>
